<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Marek Rehák</title>
    <style>
        @font-face {
            font-family: 'Cal Sans';
            font-style: normal;
            font-display: swap;
            font-weight: 400;
            src: url(https://cdn.jsdelivr.net/fontsource/fonts/cal-sans@latest/latin-400-normal.woff2) format('woff2');
        }

        body { 
            background-color: #ffffff; 
            margin: 0; 
            padding: 50px 20px; 
            font-family: 'Cal Sans', sans-serif; 
        }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        h1 {
            color: #000000; 
            font-size: 2.3rem;
            /* Výrazne zväčšený kerning (rozostupy medzi písmenami) */
            letter-spacing: 0.15em; 
            margin: 0;
            text-transform: none; 
        }

        .galeria { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 20px; 
            max-width: 1200px;
            margin: 0 auto;
        }

        .kresba { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        .kresba img { 
            width: 100%; 
            height: auto; 
            object-fit: contain; 
        }
    </style>
</head>
<body>

    <header>
        <h1>Portfolio: Marek Rehák</h1>
    </header>
    
    <main>
        <div class="galeria">
            <div class="kresba"><img src="1.png" alt=""></div>
            <div class="kresba"><img src="2.png" alt=""></div>
            <div class="kresba"><img src="3.png" alt=""></div>
            <div class="kresba"><img src="4.png" alt=""></div>
            <div class="kresba"><img src="5.png" alt=""></div>
            <div class="kresba"><img src="6.png" alt=""></div>
            <div class="kresba"><img src="7.png" alt=""></div>
            <div class="kresba"><img src="8.png" alt=""></div>
            <div class="kresba"><img src="9.png" alt=""></div>
            <div class="kresba"><img src="10.png" alt=""></div>
            <div class="kresba"><img src="11.png" alt=""></div>
            <div class="kresba"><img src="12.png" alt=""></div>
            <div class="kresba"><img src="13.png" alt=""></div>
            <div class="kresba"><img src="14.png" alt=""></div>
            <div class="kresba"><img src="15.png" alt=""></div>
            <div class="kresba"><img src="16.png" alt=""></div>
            <div class="kresba"><img src="17.png" alt=""></div>
            <div class="kresba"><img src="18.png" alt=""></div>
            <div class="kresba"><img src="19.png" alt=""></div>
        </div>
    </main>

</body>
</html>
