
<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<img src="Logo1.png" style="max-width: 150px; display: block; margin: 0 auto;" alt="Logo">
    <style>
        @font-face {
            font-family: 'Cal Sans';
            font-style: normal;
            font-display: swap;
            font-weight: 400;
            src: url(https://cdn.jsdelivr.net/fontsource/fonts/cal-sans@latest/latin-400-normal.woff2) format('woff2');
        }

        body { 
            background-color: #ffffff; 
            margin: 0; 
            padding: 50px 20px; 
            font-family: 'Cal Sans', sans-serif; 
        }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        h1 {
            color: #000000; 
            font-size: 2.3rem;
            /* Kerning sme znížili z 0.15em na príjemných 0.08em */
            letter-spacing: 0.08em; 
            margin: 0;
            text-transform: none; 
        }

        .galeria { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 20px; 
            max-width: 1200px;
            margin: 0 auto;
        }

        .kresba { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

       .kresba img { 
            width: 100%; 
            height: auto; 
            object-fit: contain; 
            /* Toto pridá elegantné zaoblenie rohov */
            border-radius: 12px; 
        } 
    </style>
</head>
<body>

    <header>
        <h1>Portfolio: Marek Rehák</h1>
    </header>
    
    <main>
        <div class="galeria">
            <div class="kresba"><img src="Prace/1.png" alt=""></div>
            <div class="kresba"><img src="Prace/2.png" alt=""></div>
            <div class="kresba"><img src="Prace/3.png" alt=""></div>
            <div class="kresba"><img src="Prace/4.png" alt=""></div>
            <div class="kresba"><img src="Prace/5.jpg" alt=""></div>
            <div class="kresba"><img src="Prace/6.png" alt=""></div>
            <div class="kresba"><img src="Prace/7.png" alt=""></div>
            <div class="kresba"><img src="Prace/8.png" alt=""></div>
            <div class="kresba"><img src="Prace/9.png" alt=""></div>
            <div class="kresba"><img src="Prace/10.png" alt=""></div>
            <div class="kresba"><img src="Prace/11.png" alt=""></div>
            <div class="kresba"><img src="Prace/12.png" alt=""></div>
            <div class="kresba"><img src="Prace/13.png" alt=""></div>
            <div class="kresba"><img src="Prace/14.png" alt=""></div>
            <div class="kresba"><img src="Prace/15.png" alt=""></div>
            <div class="kresba"><img src="Prace/16.png" alt=""></div>
            <div class="kresba"><img src="Prace/17.png" alt=""></div>
            <div class="kresba"><img src="Prace/18.png" alt=""></div>
        </div>
    </main>

</body>
</html>
