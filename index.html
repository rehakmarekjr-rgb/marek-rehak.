
<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <style>
        @font-face {
            font-family: 'Cal Sans';
            font-style: normal;
            font-display: swap;
            font-weight: 400;
            src: url(https://cdn.jsdelivr.net/fontsource/fonts/cal-sans@latest/latin-400-normal.woff2) format('woff2');
        }

        body { 
            background-color: #ffffff; 
            margin: 0; 
            padding: 50px 20px; 
            font-family: 'Cal Sans', sans-serif; 
        }

        header {
            text-align: center;
            margin-bottom: 120px;
        }

        .web-logo {
            max-width: 250px; 
            height: auto;
            display: block;
            margin: 0 auto;
        }

        /* Nové nastavenie pre Masonry efekt */
        .galeria { 
            column-count: 3; /* Počet stĺpcov vedľa seba */
            column-gap: 20px; /* Medzera medzi stĺpcami */
            max-width: 1200px;
            margin: 0 auto;
        }

        .kresba { 
            display: inline-block; /* Dôležité, aby sa obrázky nelámali napoly */
            width: 100%;
            margin-bottom: 20px; /* Medzera pod každým obrázkom */
        }

        .kresba img { 
            width: 100%; 
            height: auto; 
            display: block;
            object-fit: contain; 
            border-radius: 12px; 
        }

        /* Prispôsobenie pre menšie obrazovky (mobily) */
        @media (max-width: 900px) {
            .galeria { column-count: 2; }
        }
        @media (max-width: 600px) {
            .galeria { column-count: 1; }
        }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" alt="Logo" class="web-logo">
    </header>
    
    <main>
        <div class="galeria">
            <div class="kresba"><img src="Prace/1.png" alt=""></div>
            <div class="kresba"><img src="Prace/2.png" alt=""></div>
            <div class="kresba"><img src="Prace/3.png" alt=""></div>
            <div class="kresba"><img src="Prace/4.png" alt=""></div>
            <div class="kresba"><img src="Prace/5.png" alt=""></div>
            <div class="kresba"><img src="Prace/6.png" alt=""></div>
            <div class="kresba"><img src="Prace/7.png" alt=""></div>
            <div class="kresba"><img src="Prace/8.png" alt=""></div>
            <div class="kresba"><img src="Prace/9.png" alt=""></div>
            <div class="kresba"><img src="Prace/10.png" alt=""></div>
            <div class="kresba"><img src="Prace/11.png" alt=""></div>
            <div class="kresba"><img src="Prace/12.png" alt=""></div>
            <div class="kresba"><img src="Prace/13.png" alt=""></div>
            <div class="kresba"><img src="Prace/14.png" alt=""></div>
            <div class="kresba"><img src="Prace/15.png" alt=""></div>
            <div class="kresba"><img src="Prace/16.png" alt=""></div>
            <div class="kresba"><img src="Prace/17.png" alt=""></div>
            <div class="kresba"><img src="Prace/18.png" alt=""></div>
        </div>
    </main>

</body>
</html>
